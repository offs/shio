name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like v0.1.0"
          }
          $msiVersion = $tag.TrimStart("v")
          if ($msiVersion -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "MSI version must be numeric"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "msi_version=$msiVersion" >> $env:GITHUB_OUTPUT
      - name: Verify Cargo version
        shell: pwsh
        run: |
          $cargoVersion = cargo metadata --no-deps --format-version 1 |
            ConvertFrom-Json |
            Select-Object -ExpandProperty packages |
            Where-Object { $_.name -eq "shio-app" } |
            Select-Object -ExpandProperty version
          if ($cargoVersion -ne "${{ steps.version.outputs.msi_version }}") {
            throw "release tag ${{ steps.version.outputs.tag }} does not match Cargo version $cargoVersion"
          }
      - uses: taiki-e/install-action@5c9b7505b27fc3ffa1c92237ed2126817a48453c
        with:
          tool: cargo-deny
      - name: Validate
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --all-targets --locked
          cargo deny check
      - name: Install tools
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2
      - name: Build
        run: cargo build --release -p shio-app --locked
      - name: MSI
        shell: pwsh
        working-directory: crates/shio-app
        run: |
          $version = "${{ steps.version.outputs.tag }}"
          $msiVersion = "${{ steps.version.outputs.msi_version }}"
          New-Item -ItemType Directory -Force -Path ..\..\dist | Out-Null
          wix -ext WixToolset.UI.wixext build -pdbtype none -arch x64 -d PackageVersion=$msiVersion -d CargoTargetBinDir=..\..\target\release wix\main.wxs -o "..\..\dist\shio-$version-windows-x64.msi"
          Get-FileHash "..\..\dist\shio-$version-windows-x64.msi" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  shio-$version-windows-x64.msi" } |
            Set-Content "..\..\dist\shio-$version-windows-x64.msi.sha256"
      - name: Zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.tag }}"
          $portable = "dist/shio-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $portable | Out-Null
          Copy-Item target/release/shio.exe "$portable/shio.exe"
          Copy-Item README.md "$portable/README.md"
          Copy-Item LICENSE "$portable/LICENSE"
          Compress-Archive -Path "$portable/*" -DestinationPath "$portable.zip" -Force
          Get-FileHash "$portable.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  shio-$version-windows-x64.zip" } |
            Set-Content "$portable.zip.sha256"
      - name: Attest artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            dist/*.msi
            dist/*.zip
            dist/*.sha256
      - name: Publish
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.msi
            dist/*.zip
            dist/*.sha256
